const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const fmt = (w) => (w >= 1 ? (Math.round(w * 100) / 100) + " кг" : Math.round(w * 1000) + " г");
const hPaToMm = (h) => h * 0.7500617;
const compass = (d) => ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"][Math.round(d / 45) % 8];
const buzz = (p) => { try { navigator.vibrate?.(p); } catch (_) {} };
const dayKey = (ts) => new Date(ts).toLocaleDateString("sv");
const fmtClock = (d) => new Date(d).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
const fmtDate = (ts) => new Date(ts).toLocaleDateString("ru-RU", { day: "numeric", month: "short" });
const WD = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
const trophyThreshold = (f) => f.min + (f.max - f.min) * 0.82;
const isRainCode = (c) => (c >= 51 && c <= 67) || (c >= 80 && c <= 82) || c >= 95;

// ── fish glyph ────────────────────────────────────────────────
function FishGlyph({ shape = "panfish", color = "#888", size = 64, dim = false, trophy = false }) {
  const cfg = { panfish: { rx: 26, ry: 18 }, deep: { rx: 23, ry: 23 }, predator: { rx: 35, ry: 11 } }[shape];
  const cx = 54, cy = 30, { rx, ry } = cfg, lx = cx - rx;
  const fill = dim ? "#3a4a52" : color;
  const stroke = trophy ? "#f5b942" : "rgba(0,0,0,0.25)";
  return (
    <svg width={size} height={size * 0.6} viewBox="0 0 100 60" style={{ display: "block" }}>
      <path d={`M${lx} ${cy} L${lx-18} ${cy-16} L${lx-18} ${cy+16} Z`} fill={fill} stroke={stroke} strokeWidth={trophy?2:0} strokeLinejoin="round" />
      <path d={`M${cx-12} ${cy-ry+6} L${cx+4} ${cy-ry-9} L${cx+14} ${cy-ry+4} Z`} fill={fill} stroke={stroke} strokeWidth={trophy?2:0} strokeLinejoin="round" />
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={fill} stroke={stroke} strokeWidth={trophy?2.5:0} />
      <circle cx={cx+rx-10} cy={cy-ry*0.25} r={3.4} fill="#fff" />
      <circle cx={cx+rx-9} cy={cy-ry*0.25} r={1.7} fill="#15252b" />
      {!dim && <ellipse cx={cx-2} cy={cy-ry*0.35} rx={rx*0.5} ry={ry*0.28} fill="rgba(255,255,255,0.18)" />}
    </svg>
  );
}

// ── bite engine (works for "now" and any hour) ────────────────
function biteIndex(c) {
  // c: {tempC, pHpa, pTrendHpa, windMs, windDir, clouds, isDay, isDawnDusk, brightMidday, month}
  let idx = 50; const why = [];
  if (c.isDawnDusk) { idx += 20; why.push({ t: "Зорька — пик активности", good: true }); }
  else if (c.brightMidday) { idx -= 10; why.push({ t: "Яркое солнце в полдень — клёв вялый", good: false }); }
  else if (!c.isDay) { idx -= 4; why.push({ t: "Ночь — большинство рыбы пассивно", good: false }); }

  if (c.pTrendHpa <= -1 && c.pTrendHpa >= -4) { idx += 12; why.push({ t: "Давление плавно падает — рыба жирует", good: true }); }
  else if (c.pTrendHpa < -4) { idx += 4; why.push({ t: "Давление резко падает — идёт фронт", good: true }); }
  else if (c.pTrendHpa > 3) { idx -= 14; why.push({ t: "Давление резко растёт — рыба у дна", good: false }); }
  else if (c.pTrendHpa > 1) { idx -= 8; why.push({ t: "Давление растёт — клёв слабее", good: false }); }
  else { idx += 6; why.push({ t: "Давление стабильное", good: true }); }
  if (c.pHpa > 1025) idx -= 6; else if (c.pHpa < 995) idx -= 4;

  if (c.clouds >= 60) { idx += 8; why.push({ t: "Пасмурно — хищник гуляет", good: true }); }
  else if (c.clouds >= 30) idx += 4; else if (!c.brightMidday) idx += 2;

  if (c.windMs >= 1 && c.windMs <= 5) { idx += 8; why.push({ t: "Лёгкая рябь — то что надо", good: true }); }
  else if (c.windMs < 1) { idx -= 4; why.push({ t: "Штиль — рыба осторожна", good: false }); }
  else if (c.windMs > 8) { idx -= 12; why.push({ t: "Сильный ветер", good: false }); }
  if (c.windDir != null) { if (c.windDir >= 45 && c.windDir <= 135) idx -= 5; else if (c.windDir >= 225 && c.windDir <= 315) idx += 5; }

  if (c.tempC >= 8 && c.tempC <= 20) idx += 6;
  else if (c.tempC > 27) { idx -= 8; why.push({ t: "Жара — рыба на глубине", good: false }); }
  else if (c.tempC < 3) idx -= 4;

  return { idx: Math.round(clamp(idx, 5, 98)), why };
}

function speciesMod(id, c) {
  let m = 0;
  switch (id) {
    case "okun":   m += c.clouds > 50 ? 4 : 0; m += c.isDawnDusk ? 3 : 0; m -= c.brightMidday ? 3 : 0; break;
    case "plotva": m += 2; m -= c.windMs > 8 ? 2 : 0; break;
    case "golavl": m += c.tempC > 15 && c.isDay ? 6 : 0; m += c.brightMidday ? 4 : 0; m -= c.tempC < 8 ? 8 : 0; m -= !c.isDay ? 4 : 0; break;
    case "yaz":    m += c.tempC > 15 ? 5 : 0; m -= c.tempC < 8 ? 6 : 0; m += c.isDawnDusk ? 3 : 0; break;
    case "shchuka":m += c.clouds > 60 ? 8 : 0; m += c.pTrendHpa < -1 ? 8 : 0; m += c.isDawnDusk ? 5 : 0; m -= c.brightMidday && c.pHpa > 1022 ? 10 : 0; m -= c.windMs > 8 ? 4 : 0; break;
    case "leshch": m += c.isDawnDusk ? 6 : 0; m += c.tempC >= 12 && c.tempC <= 24 ? 4 : 0; m -= c.windMs > 8 ? 5 : 0; m -= c.brightMidday ? 4 : 0; break;
    case "zhereh": m += c.tempC > 17 && c.isDay ? 7 : 0; m += c.windMs >= 2 && c.windMs <= 6 ? 5 : 0; m -= c.tempC < 10 ? 8 : 0; m -= !c.isDay ? 5 : 0; break;
    case "nalim":  m += !c.isDay ? 14 : 0; m += c.tempC < 6 ? 12 : 0; m += c.pTrendHpa < -2 ? 8 : 0; m += [9,10,11,0,1,2].includes(c.month) ? 6 : 0; m -= c.tempC > 22 ? 18 : 0; m -= c.brightMidday ? 10 : 0; break;
    case "harius": m += c.tempC > 4 && c.tempC < 18 ? 8 : 0; m += c.clouds >= 30 && c.clouds <= 80 ? 6 : 0; m -= c.tempC > 24 ? 10 : 0; m -= c.brightMidday ? 4 : 0; break;
    case "taimen": m += c.isDawnDusk ? 6 : 0; m += c.clouds > 50 ? 6 : 0; m += c.tempC < 16 ? 5 : 0; break;
    default: break;
  }
  return m;
}

function hourlyIdx(w, date) {
  const t0 = new Date(w.hourly.time[0]).getTime();
  return clamp(Math.round((date.getTime() - t0) / 3600000), 0, w.hourly.time.length - 1);
}
function condAt(w, date, flags = {}) {
  const i = hourlyIdx(w, date);
  const h = w.hourly;
  return {
    tempC: h.temperature_2m[i], pHpa: h.surface_pressure[i],
    pTrendHpa: i >= 3 ? h.surface_pressure[i] - h.surface_pressure[i - 3] : 0,
    windMs: h.wind_speed_10m[i], windDir: null, clouds: h.cloud_cover[i],
    code: h.weather_code[i], month: date.getMonth(),
    isDay: flags.isDay ?? true, isDawnDusk: flags.isDawnDusk ?? false,
    brightMidday: flags.brightMidday ?? false,
  };
}

function computeForecast(w) {
  const now = new Date();
  const cur = w.current;
  const sunrise = new Date(w.daily.sunrise[0]);
  const sunset = new Date(w.daily.sunset[0]);
  const isDay = cur.is_day === 1;
  const isDawn = now >= new Date(+sunrise - 30 * 60000) && now <= new Date(+sunrise + 120 * 60000);
  const isDusk = now >= new Date(+sunset - 120 * 60000) && now <= new Date(+sunset + 45 * 60000);
  const hour = now.getHours();
  const brightMidday = isDay && hour >= 11 && hour <= 16 && cur.cloud_cover < 40;

  let pTrendHpa = 0;
  try { const i = hourlyIdx(w, now); if (i >= 3) pTrendHpa = w.hourly.surface_pressure[i] - w.hourly.surface_pressure[i - 3]; } catch (_) {}

  const cond = {
    tempC: cur.temperature_2m, pHpa: cur.surface_pressure, pTrendHpa,
    windMs: cur.wind_speed_10m, windDir: cur.wind_direction_10m,
    clouds: cur.cloud_cover, isDay, isDawnDusk: isDawn || isDusk, brightMidday, month: now.getMonth(),
    code: cur.weather_code,
  };
  const { idx, why } = biteIndex(cond);
  const species = {};
  for (const id of FISH_IDS) species[id] = clamp(idx + speciesMod(id, cond), 5, 99);

  let verdict, vColor;
  if (idx >= 70) { verdict = "Отличный клёв"; vColor = "#52d27a"; }
  else if (idx >= 50) { verdict = "Хороший клёв"; vColor = "#9ed24a"; }
  else if (idx >= 35) { verdict = "Средний клёв"; vColor = "#f5b942"; }
  else { verdict = "Слабый клёв"; vColor = "#e06b4a"; }

  // 3-day golden windows
  const windows = [];
  const nDays = Math.min(3, w.daily.sunrise.length);
  for (let d = 0; d < nDays; d++) {
    const sr = new Date(w.daily.sunrise[d]);
    const ss = new Date(w.daily.sunset[d]);
    const mkWin = (center, label, from, to) => {
      if (center < new Date(now.getTime() - 60 * 60000)) return null; // прошло
      const c = condAt(w, center, { isDay: true, isDawnDusk: true });
      const { idx } = biteIndex(c);
      return { day: d, label, range: `${fmtClock(from)}–${fmtClock(to)}`, idx, code: c.code, ts: +center };
    };
    const m = mkWin(new Date(+sr + 60 * 60000), "утро", new Date(+sr - 30 * 60000), new Date(+sr + 150 * 60000));
    const e = mkWin(new Date(+ss - 60 * 60000), "вечер", new Date(+ss - 120 * 60000), new Date(+ss + 30 * 60000));
    if (m) windows.push(m); if (e) windows.push(e);
  }
  const best = windows.length ? windows.reduce((a, b) => (b.idx > a.idx ? b : a)) : null;

  return {
    index: idx, verdict, vColor, why: why.slice(0, 4), species, windows, best,
    cond: { ...cond, pMm: hPaToMm(cond.pHpa), pTrendMm: hPaToMm(pTrendHpa), sunrise, sunset },
  };
}

// quest of the day (deterministic from forecast)
function buildQuest(forecast) {
  if (!forecast) return null;
  if (forecast.index < 40) {
    return { type: "any", emoji: "💪", title: "Вопреки стихии", desc: "Клёв слабый — любой улов сегодня вдвое ценнее", mult: 2 };
  }
  const cand = FISH_IDS
    .filter((id) => FISH[id].rarity !== "common" && FISH[id].rarity !== "legendary")
    .sort((a, b) => forecast.species[b] - forecast.species[a]);
  const top = cand.find((id) => forecast.species[id] >= 55);
  if (top) {
    const xp = Math.round(80 * RARITY[FISH[top].rarity].mult);
    return { type: "fish", fid: top, emoji: "🎯", title: `Цель дня: ${FISH[top].name.toLowerCase()}`, desc: `Активность ${forecast.species[top]}% — самое время`, xp };
  }
  const c = [...FISH_IDS].sort((a, b) => forecast.species[b] - forecast.species[a])[0];
  return { type: "fish", fid: c, emoji: "🎯", title: `Цель дня: ${FISH[c].name.toLowerCase()}`, desc: "Самый активный вид сегодня", xp: 60 };
}

function levelInfo(xp) {
  let i = 0;
  while (i < LEVELS.length - 1 && xp >= LEVELS[i + 1].xp) i++;
  const cur = LEVELS[i], next = LEVELS[i + 1] || null;
  return { n: i + 1, name: cur.name, next, prog: next ? (xp - cur.xp) / (next.xp - cur.xp) : 1, toNext: next ? next.xp - xp : 0 };
}

// ── persistence ───────────────────────────────────────────────
const KEY = "chusovaya-go:save:v3";

// ═══════════════════════════════════════════════════════════════
function ChusovayaGo() {
  const [tab, setTab] = useState("home");
  const [catches, setCatches] = useState([]);
  const [xp, setXp] = useState(0);
  const [ach, setAch] = useState({});
  const [spotPos, setSpotPos] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [logOpen, setLogOpen] = useState(false);
  const [mapOpen, setMapOpen] = useState(false);
  const [celebration, setCelebration] = useState(null);

  const [weather, setWeather] = useState(null);
  const [wxState, setWxState] = useState("loading");
  const forecast = useMemo(() => (weather ? computeForecast(weather) : null), [weather]);
  const quest = useMemo(() => buildQuest(forecast), [forecast]);

  // load / save
  useEffect(() => {
    (async () => {
      try {
        const r = await storeAPI.get(KEY);
        if (r?.value) {
          const s = JSON.parse(r.value);
          if (s.catches) setCatches(s.catches);
          if (s.xp) setXp(s.xp);
          if (s.ach) setAch(s.ach);
          if (s.spotPos) setSpotPos(s.spotPos);
        }
      } catch (_) {} finally { setLoaded(true); }
    })();
  }, []);
  useEffect(() => {
    if (!loaded) return;
    (async () => { try { await storeAPI.set(KEY, JSON.stringify({ catches, xp, ach, spotPos })); } catch (_) {} })();
  }, [catches, xp, ach, spotPos, loaded]);

  const loadWeather = useCallback(async () => {
    setWxState("loading");
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${DACHA.lat}&longitude=${DACHA.lng}` +
        `&current=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m,cloud_cover,weather_code,is_day` +
        `&hourly=temperature_2m,surface_pressure,cloud_cover,wind_speed_10m,weather_code` +
        `&daily=sunrise,sunset&timezone=auto&wind_speed_unit=ms&forecast_days=3`;
      const r = await fetch(url);
      if (!r.ok) throw new Error("net");
      setWeather(await r.json()); setWxState("ok");
    } catch (_) { setWxState("error"); }
  }, []);
  useEffect(() => { loadWeather(); }, [loadWeather]);

  // derived
  const dex = useMemo(() => {
    const d = Object.fromEntries(FISH_IDS.map((id) => [id, { count: 0, best: 0, trophy: false }]));
    for (const c of catches) {
      const e = d[c.fid]; if (!e) continue;
      e.count++; e.best = Math.max(e.best, c.w); e.trophy = e.trophy || c.flags?.trophy;
    }
    return d;
  }, [catches]);
  const lvl = levelInfo(xp);
  const questDone = useMemo(() => {
    if (!quest) return false;
    const today = dayKey(Date.now());
    return catches.some((c) => dayKey(c.ts) === today && (quest.type === "any" || c.fid === quest.fid));
  }, [quest, catches]);

  // ── log a real catch ────────────────────────────────────────
  const logCatch = (payload) => {
    const { fid, w, spotId, ts, wx, released } = payload;
    const f = FISH[fid];
    const now = new Date(ts);
    const lines = [];
    const flags = {};

    lines.push({ t: `${f.name} · ${RARITY[f.rarity].label.toLowerCase()}`, v: Math.round(20 * RARITY[f.rarity].mult) });

    if (dex[fid].count === 0) { flags.newSpecies = true; lines.push({ t: "Новый вид в Рыбадексе!", v: 100 }); }
    if (w >= trophyThreshold(f)) { flags.trophy = true; lines.push({ t: "ТРОФЕЙ", v: 150 }); }

    let dawnDusk = false;
    if (forecast) {
      const { sunrise, sunset } = forecast.cond;
      dawnDusk = (now >= new Date(+sunrise - 30 * 60000) && now <= new Date(+sunrise + 150 * 60000)) ||
                 (now >= new Date(+sunset - 120 * 60000) && now <= new Date(+sunset + 45 * 60000));
    } else { const h = now.getHours(); dawnDusk = (h >= 4 && h <= 7) || (h >= 19 && h <= 22); }
    if (dawnDusk) { flags.dawn = true; lines.push({ t: "Золотой час (зорька)", v: 15 }); }
    if (released) { flags.released = true; lines.push({ t: "Отпущена — карма", v: 10 }); }

    // bite index at catch time
    let biteIdx = null;
    if (weather) {
      try {
        const c = condAt(weather, now, { isDay: now.getHours() >= 5 && now.getHours() <= 21, isDawnDusk: dawnDusk });
        biteIdx = biteIndex(c).idx;
      } catch (_) {}
    }
    let subtotal = lines.reduce((s, l) => s + l.v, 0);
    if (biteIdx !== null && biteIdx < 35) {
      flags.defiant = true;
      const bonus = Math.round(subtotal * 0.5);
      lines.push({ t: "Вопреки прогнозу +50%", v: bonus });
      subtotal += bonus;
    }
    // quest
    let questHit = false;
    if (quest && !questDone) {
      if (quest.type === "fish" && quest.fid === fid) { questHit = true; lines.push({ t: "Квест дня выполнен", v: quest.xp }); subtotal += quest.xp; }
      if (quest.type === "any") { questHit = true; const b = subtotal; lines.push({ t: "Квест: улов ×2", v: b }); subtotal += b; }
    }

    const entry = {
      id: Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      fid, w, spotId, ts, released: !!released, wx, biteIdx, xp: subtotal, flags,
    };
    const nextCatches = [entry, ...catches];

    // achievements
    const unlocked = [];
    const tryUnlock = (id, cond) => { if (cond && !ach[id]) unlocked.push(id); };
    tryUnlock("first", true);
    tryUnlock("dawn", now.getHours() < 6);
    tryUnlock("night", now.getHours() >= 23 || now.getHours() < 4);
    tryUnlock("rain", wx && isRainCode(wx.code));
    tryUnlock("defiant", flags.defiant);
    tryUnlock("harius", fid === "harius");
    tryUnlock("pike", fid === "shchuka");
    tryUnlock("taimen", fid === "taimen");
    tryUnlock("trophy", flags.trophy);
    tryUnlock("release", !!released);
    tryUnlock("five_day", nextCatches.filter((c) => dayKey(c.ts) === dayKey(ts)).length >= 5);
    tryUnlock("scout", new Set(nextCatches.map((c) => c.spotId)).size >= SPOTS.length);
    tryUnlock("half_dex", new Set(nextCatches.map((c) => c.fid)).size >= 5);
    if (unlocked.length) {
      const stamp = Date.now();
      setAch((a) => ({ ...a, ...Object.fromEntries(unlocked.map((id) => [id, stamp])) }));
      lines.push(...unlocked.map((id) => ({ t: `${ACH[id].emoji} ${ACH[id].name}`, v: 25 })));
      subtotal += unlocked.length * 25;
      entry.xp = subtotal;
    }

    const before = levelInfo(xp), after = levelInfo(xp + subtotal);
    setCatches(nextCatches);
    setXp((x) => x + subtotal);
    setLogOpen(false);
    setCelebration({ entry, lines, total: subtotal, unlocked, levelUp: after.n > before.n ? after : null });
    buzz([0, 40, 30, 40, 30, 80]);
  };

  const deleteCatch = (id) => {
    const c = catches.find((x) => x.id === id);
    if (!c) return;
    if (!window.confirm(`Удалить запись: ${FISH[c.fid].name} ${fmt(c.w)}? XP тоже спишется.`)) return;
    setCatches((arr) => arr.filter((x) => x.id !== id));
    setXp((x) => Math.max(0, x - (c.xp || 0)));
  };

  const stats = useMemo(() => {
    const trips = new Set(catches.map((c) => dayKey(c.ts))).size;
    const totalW = catches.reduce((s, c) => s + c.w, 0);
    const best = catches.reduce((b, c) => (!b || c.w > b.w ? c : b), null);
    return { trips, totalW, best, count: catches.length, species: FISH_IDS.filter((id) => dex[id].count > 0).length };
  }, [catches, dex]);

  return (
    <div style={S.app}>
      <style>{CSS}</style>

      <header style={S.hud}>
        <div style={S.logo}><span style={S.logoIcon}>🎣</span><span>ЧУСОВАЯ <span style={{ color: "#f5b942" }}>GO</span></span></div>
        <div style={S.lvlChip}>Ур. {lvl.n} · {lvl.name}</div>
      </header>
      <div style={S.xpBarWrap} title={lvl.next ? `${lvl.toNext} XP до «${lvl.next.name}»` : "Максимум"}>
        <div style={{ ...S.xpBarFill, width: `${Math.round(lvl.prog * 100)}%` }} />
        <span style={S.xpBarText}>{xp} XP{lvl.next ? ` · до след. ${lvl.toNext}` : " · MAX"}</span>
      </div>

      <main style={S.main}>
        {tab === "home" && (
          <HomeView forecast={forecast} wxState={wxState} onRetryWx={loadWeather}
            quest={quest} questDone={questDone} catches={catches}
            onLog={() => setLogOpen(true)} onMap={() => setMapOpen(true)} />
        )}
        {tab === "wx" && <ForecastView forecast={forecast} wxState={wxState} onRetry={loadWeather} />}
        {tab === "dex" && <DexView dex={dex} ach={ach} />}
        {tab === "journal" && <JournalView catches={catches} stats={stats} onDelete={deleteCatch} />}
      </main>

      <nav style={S.nav}>
        {[["home","🏕️","Главная"],["wx","🌤️","Прогноз"],["dex","📖","Рыбадекс"],["journal","📓","Журнал"]].map(([k,i,l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ ...S.navBtn, ...(tab === k ? S.navOn : {}) }}>
            <span style={S.navIcon}>{i}</span>{l}
          </button>
        ))}
      </nav>

      {logOpen && <LogWizard weather={weather} onCancel={() => setLogOpen(false)} onSave={logCatch} lastSpot={catches[0]?.spotId} />}
      {mapOpen && <MapOverlay spotPos={spotPos} onMove={(id, lat, lng) => setSpotPos((p) => ({ ...p, [id]: [lat, lng] }))} onClose={() => setMapOpen(false)} />}
      {celebration && <Celebration data={celebration} onClose={() => setCelebration(null)} />}
    </div>
  );
}

// ── LOG WIZARD ────────────────────────────────────────────────
function LogWizard({ weather, onCancel, onSave, lastSpot }) {
  const [step, setStep] = useState("species"); // species → weight → spot → confirm
  const [fid, setFid] = useState(null);
  const [w, setW] = useState(0);
  const [spotId, setSpotId] = useState(lastSpot || "gari");
  const [whenH, setWhenH] = useState(-1); // -1 = сейчас, else hour of today
  const [released, setReleased] = useState(false);

  const f = fid ? FISH[fid] : null;
  const stepSize = w < 1 ? 0.05 : w < 3 ? 0.1 : 0.25;
  const nowH = new Date().getHours();
  const whenOpts = [{ h: -1, l: "Сейчас" }, { h: 6, l: "Утром ~6:00" }, { h: 13, l: "Днём ~13:00" }, { h: 20, l: "Вечером ~20:00" }]
    .filter((o) => o.h === -1 || o.h <= nowH);

  const pickSpecies = (id) => {
    setFid(id);
    const ff = FISH[id];
    const mid = ff.min + (ff.max - ff.min) * 0.35;
    setW(Math.round(mid * 20) / 20);
    setStep("weight");
  };
  const chips = f ? [f.min, f.min + (f.max - f.min) * 0.33, f.min + (f.max - f.min) * 0.66, f.max].map((x) => Math.round(x * 20) / 20) : [];

  const save = () => {
    let ts = Date.now(), wx = null;
    if (whenH >= 0) { const d = new Date(); d.setHours(whenH, 0, 0, 0); ts = d.getTime(); }
    if (weather) {
      if (whenH < 0) {
        const c = weather.current;
        wx = { t: c.temperature_2m, code: c.weather_code, wind: c.wind_speed_10m, cloud: c.cloud_cover, pMm: Math.round(hPaToMm(c.surface_pressure)) };
      } else {
        try {
          const i = hourlyIdx(weather, new Date(ts));
          const h = weather.hourly;
          wx = { t: h.temperature_2m[i], code: h.weather_code[i], wind: h.wind_speed_10m[i], cloud: h.cloud_cover[i], pMm: Math.round(hPaToMm(h.surface_pressure[i])) };
        } catch (_) {}
      }
    }
    onSave({ fid, w, spotId, ts, wx, released });
  };

  return (
    <div style={S.overlay}>
      <div style={S.wizHead}>
        <button onClick={step === "species" ? onCancel : () => setStep(step === "weight" ? "species" : step === "spot" ? "weight" : "spot")} style={S.back}>‹ {step === "species" ? "Отмена" : "Назад"}</button>
        <span style={S.wizStep}>{["species","weight","spot","confirm"].indexOf(step) + 1}/4</span>
      </div>

      {step === "species" && (
        <div style={S.wizBody}>
          <h2 style={S.wizH}>Кого поймал?</h2>
          <div style={S.spGrid}>
            {FISH_IDS.map((id) => {
              const ff = FISH[id], r = RARITY[ff.rarity];
              return (
                <button key={id} onClick={() => pickSpecies(id)} style={S.spCell} className="tapcell">
                  <FishGlyph shape={ff.shape} color={ff.color} size={54} />
                  <span style={S.spName}>{ff.name}</span>
                  <span style={{ ...S.spDot, background: r.color }} />
                </button>
              );
            })}
          </div>
        </div>
      )}

      {step === "weight" && f && (
        <div style={S.wizBody}>
          <h2 style={S.wizH}>{f.name} — вес?</h2>
          <div style={S.wCenter}>
            <FishGlyph shape={f.shape} color={f.color} size={90} trophy={w >= trophyThreshold(f)} />
            <div style={S.wValue}>{fmt(w)}</div>
            {w >= trophyThreshold(f) && <div style={S.wTrophy}>🏆 Трофейный размер!</div>}
            <div style={S.wBtns}>
              <button style={S.wBtn} className="cast" onClick={() => setW((x) => Math.max(0.05, Math.round((x - stepSize) * 100) / 100))}>−</button>
              <button style={S.wBtn} className="cast" onClick={() => setW((x) => Math.round((x + stepSize) * 100) / 100)}>+</button>
            </div>
            <div style={S.wChips}>
              {chips.map((c, i) => (
                <button key={i} onClick={() => setW(c)} style={{ ...S.wChip, ...(Math.abs(c - w) < 0.001 ? S.wChipOn : {}) }}>{fmt(c)}</button>
              ))}
            </div>
          </div>
          <button onClick={() => setStep("spot")} style={S.cta} className="cast">Дальше →</button>
        </div>
      )}

      {step === "spot" && (
        <div style={S.wizBody}>
          <h2 style={S.wizH}>Где?</h2>
          <div style={S.spotList}>
            {SPOTS.map((s) => (
              <button key={s.id} onClick={() => { setSpotId(s.id); setStep("confirm"); }}
                style={{ ...S.spotBtn, ...(spotId === s.id ? S.spotBtnOn : {}) }} className="tapcell">
                <span style={{ fontSize: 20 }}>{s.base ? "🏠" : "🎣"}</span>
                <span><b>{s.name}</b><br /><small style={{ color: "#8aa3ad" }}>{s.sub}</small></span>
              </button>
            ))}
          </div>
        </div>
      )}

      {step === "confirm" && f && (
        <div style={S.wizBody}>
          <h2 style={S.wizH}>Проверь и записывай</h2>
          <div style={S.confCard}>
            <FishGlyph shape={f.shape} color={f.color} size={70} trophy={w >= trophyThreshold(f)} />
            <div style={{ marginTop: 8, fontWeight: 900, fontSize: 19 }}>{f.name} · {fmt(w)}</div>
            <div style={{ color: "#8aa3ad", fontSize: 13.5, marginTop: 3 }}>{SPOTS.find((s) => s.id === spotId)?.name}</div>
          </div>
          <div style={S.confBlock}>
            <div style={S.confLabel}>Когда поймал</div>
            <div style={S.wChips}>
              {whenOpts.map((o) => (
                <button key={o.h} onClick={() => setWhenH(o.h)} style={{ ...S.wChip, ...(whenH === o.h ? S.wChipOn : {}) }}>{o.l}</button>
              ))}
            </div>
          </div>
          <button onClick={() => setReleased((r) => !r)} style={{ ...S.relToggle, ...(released ? S.relOn : {}) }}>
            {released ? "💚 Отпустил обратно" : "🧺 Забрал в садок"} <small style={{ opacity: 0.7 }}>(тапни чтобы сменить)</small>
          </button>
          <button onClick={save} style={S.cta} className="cast">🎣 Записать улов</button>
        </div>
      )}
    </div>
  );
}

                  <span style={S.winTime}>{w.range} {WCODE(w.code).e}</span>

          const col = a >= 65 ? "#52d27a" : a >= 45 ? "#9ed24a" : a >= 30 ? "#f5b942" : "#e0824a";

            <div key={id} style={S.actRow}>

}

function JournalView({ catches, stats, onDelete }) {
  const byFish = useMemo(() => {
    const m = {};
    for (const c of catches) m[c.fid] = (m[c.fid] || 0) + 1;
    return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 5);
  }, [catches]);
  const maxCount = byFish[0]?.[1] || 1;

  return (
    <div>
      <div style={S.statStrip}>
        <Stat label="Выездов" value={stats.trips} />
        <Stat label="Уловов" value={stats.count} />
        <Stat label="Общий вес" value={stats.totalW ? fmt(stats.totalW) : "—"} />
        <Stat label="Рекорд" value={stats.best ? fmt(stats.best.w) : "—"} sub={stats.best ? FISH[stats.best.fid].name : ""} />
      </div>

      {byFish.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          <div style={S.cardKicker}>Кто клюёт чаще</div>
          {byFish.map(([id, n]) => (
            <div key={id} style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
              <span style={{ fontSize: 12.5, fontWeight: 800, width: 64 }}>{FISH[id].name}</span>
              <div style={{ ...S.actTrack, flex: 1, marginTop: 0 }}><div style={{ ...S.actFill, width: `${(n / maxCount) * 100}%`, background: FISH[id].color }} /></div>
              <span style={{ fontSize: 12.5, fontWeight: 900, color: "#8aa3ad", width: 22, textAlign: "right" }}>{n}</span>
            </div>
          ))}
        </div>

        <p style={{ ...S.muted, marginTop: 10 }}>Пока пусто. Первый улов — жми «Записать улов» на главной. Даже плотвичка считается 😉</p>

          {catches.map((c) => <CatchRow key={c.id} c={c} onDelete={onDelete} />)}

  );
}
function Stat({ label, value, sub }) {
  return <div style={S.stat}><span style={S.statValue}>{value}</span><span style={S.statLabel}>{label}</span>{sub && <span style={S.statSub}>{sub}</span>}</div>;

// ── MAP OVERLAY (Leaflet/OSM) ─────────────────────────────────
function MapOverlay({ spotPos, onMove, onClose }) {
  const [state, setState] = useState(window.L ? "ready" : "loading");
  const mapEl = useRef(null);
  const mapRef = useRef(null);
  const moveRef = useRef(onMove); moveRef.current = onMove;

  useEffect(() => {
    if (window.L) { setState("ready"); return; }
    const css = document.createElement("link");
    css.rel = "stylesheet"; css.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(css);
    const js = document.createElement("script");
    js.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
    js.onload = () => setState("ready");
    js.onerror = () => setState("error");
    document.body.appendChild(js);
  }, []);

  useEffect(() => {
    if (state !== "ready" || !mapEl.current || mapRef.current) return;
    const L = window.L;
    const map = L.map(mapEl.current, { attributionControl: false }).setView([DACHA.lat, DACHA.lng], 14);
    mapRef.current = map;
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
    SPOTS.forEach((s) => {
      const ll = spotPos[s.id] || s.ll;
      const icon = L.divIcon({ className: "", html: `<div class="leaf-pin ${s.base ? "base" : ""}">${s.base ? "🏠" : "🎣"}</div>`, iconSize: [34, 34], iconAnchor: [17, 17] });
      const m = L.marker(ll, { draggable: true, icon }).addTo(map);
      m.bindTooltip(s.name, { direction: "top", offset: [0, -14] });
      m.on("dragend", (e) => { const p = e.target.getLatLng(); moveRef.current(s.id, p.lat, p.lng); });
    });
    setTimeout(() => map.invalidateSize(), 250);
    return () => { map.remove(); mapRef.current = null; };
    // eslint-disable-next-line
  }, [state]);

  return (
    <div style={S.overlay}>
      <div style={S.wizHead}>
        <button onClick={onClose} style={S.back}>‹ Готово</button>
        <span style={S.wizStep}>перетащи метки на свои точки</span>
      </div>
      <div style={{ flex: 1, borderRadius: 18, overflow: "hidden", margin: "0 14px 14px", border: "1px solid #1d4250", position: "relative" }}>
        {state === "error"
          ? <div style={S.center}>Карта не загрузилась. Споты всё равно доступны при записи улова.</div>
          : <div ref={mapEl} style={{ width: "100%", height: "100%" }} />}
        {state === "loading" && <div style={S.mapLoading}>Загружаю карту…</div>}
      </div>
    </div>
  );
}
